<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>JSON Login</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2"
      crossorigin="anonymous"></script>
</head>
<style>
   .animation {
      animation: cColors 10s linear 0s infinite;
   }

   @keyframes cColors {
      0% {
         background-color: orangered;
      }

      20% {
         background-color: rgb(43, 1, 1);
      }

      40% {
         background-color: rgba(39, 23, 2, 0.685);
      }

      60% {
         background-color: rgb(128, 4, 4);
      }

      80% {
         background-color: rgb(157, 255, 0);
      }

      100% {
         background-color: orange;
      }
   }

</style>

<body class="bg-dark">
   <div class="container bg-light w-75">
      <div class="row shadow-lg mt-5 py-5 px-3 rounded-pill">
         <div class="col-sm-6 animation">
         </div>
         <div class="col-sm-6">
            <h1 class="card-header text-center">LOGIN</h1>
            <div class="to my-4">
               <label for="">Email</label>
               <div class="form-floating">
                  <input type="text" name="email" id="em" class="form-control" placeholder="Email address">
                  <label for="">Email Address</label>
               </div>
            </div>
            <div class="to my-4">
               <label for="">Password</label>
               <div class="form-floating">
                  <input type="password" name="password" id="pw" class="form-control" placeholder="Password">
                  <label for="">Password</label>
               </div>
            </div>
            <div class="row">
               <p class="col-6">Don't have an account <span><a href="/index.html">Sign Up</a></span></p>
               <p class="col-6"><a href="/index.html" class="text-decoration-none text-danger">Forgotten password</a></p>
            </div>
            <small id="smallText" class="text-danger fs-5"></small>
            <button class="btn btn-warning animation text-light w-100 mt-4 py-3" onclick="login()">LOGIN</button>
         </div>
      </div>
   </div>
   <script>
      let allUser = JSON.parse(localStorage.getItem("users"))
      let newUser = []
      const login = () => {
         let email = em.value;
         let password = pw.value;
         let found = allUser.find((user)=>user.email==email && user.password==password)
         if(found){
            let userInd = allUser.indexOf(found)
            let foundUser = allUser[userInd]
            console.log(found);
            localStorage.loginUser = JSON.stringify(foundUser)
            location.href = '/dashboard.html'
         }
         else{
           document.getElementById('smallText').innerHTML = `Incorrect email or password !!!`
         }
      }
   </script>
</body>

</html>
